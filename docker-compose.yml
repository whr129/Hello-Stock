services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: news_agent
      POSTGRES_USER: news_agent
      POSTGRES_PASSWORD: news_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news_agent -d news_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
